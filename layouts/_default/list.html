{{ define "main" }}
<section class="section">
  <div class="container">
    <div class="section-head">
      <div>
        <div class="eyebrow">{{ humanize .Section }}</div>
        <h1>{{ .Title }}</h1>
        <p class="lede">{{ with .Content }}{{ . | plainify | truncate 190 }}{{ else }}Browse practical DIY content built for planning, execution, and better purchase decisions.{{ end }}</p>
      </div>
    </div>
    <div class="card-grid">
      {{ range .Pages }}{{ partial "card.html" . }}{{ end }}
    </div>
  </div>
</section>
{{ end }}
